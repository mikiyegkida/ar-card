<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR名刺</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #hint {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: bold;
      background: rgba(255,255,255,0.95);
    }
  </style>
</head>

<body>
  <div id="hint">名刺をカメラに映してください</div>

  <div id="controls">
    <button class="btn" id="playBtn">再生</button>
    <button class="btn" id="pauseBtn">停止</button>
    <button class="btn" id="muteBtn">消音ON</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind; autoStart: true; uiScanning: true;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="arVideo"
        src="asset/video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      <a-video
        id="videoPlane"
        src="#arVideo"
        position="0 0 0.1"
        width="1.5"
        height="0.85"
        rotation="-5 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const hint = document.getElementById("hint");
    const video = document.getElementById("arVideo");
    const target = document.getElementById("cardTarget");

    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const muteBtn = document.getElementById("muteBtn");

    let found = false;

    async function safePlay() {
      try {
        await video.play();
      } catch (e) {
        console.log("再生ブロック");
      }
    }

    function updateMuteText() {
      muteBtn.textContent = video.muted ? "消音ON" : "音声ON";
    }

    target.addEventListener("targetFound", async () => {
      found = true;
      hint.innerHTML = "認識しました";
      await safePlay();
    });

    target.addEventListener("targetLost", () => {
      found = false;
      hint.innerHTML = "名刺をカメラに映してください";
      video.pause();
    });

    playBtn.onclick = safePlay;

    pauseBtn.onclick = () => video.pause();

    muteBtn.onclick = async () => {
      video.muted = !video.muted;
      updateMuteText();

      if (found && video.paused) {
        await safePlay();
      }
    };

    document.body.addEventListener("click", async () => {
      if (found && video.paused) {
        await safePlay();
      }
    });

    updateMuteText();
  </script>
</body>
</html>
