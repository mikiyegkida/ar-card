<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR名刺（カメラ背景・立ち動画）</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: sans-serif;
    }

    canvas {
      background: transparent !important;
    }

    #hint {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="hint">名刺をカメラに映してください</div>

  <div id="controls">
    <button class="btn" id="playBtn" type="button">再生</button>
    <button class="btn" id="pauseBtn" type="button">停止</button>
    <button class="btn" id="muteBtn" type="button">消音ON</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind; autoStart: true; uiScanning: true; uiLoading: true;"
    embedded
    renderer="alpha: true; antialias: true; colorManagement: true;"
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    background="transparent: true"
  >
    <a-assets>
      <video
        id="arVideo"
        src="asset/video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
      <a-video
        id="videoPlane"
        src="#arVideo"
        position="0 0.42 0.03"
        width="2.2"
        height="1.25"
        rotation="60 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const hint = document.getElementById("hint");
    const video = document.getElementById("arVideo");
    const target = document.getElementById("cardTarget");

    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const muteBtn = document.getElementById("muteBtn");

    let found = false;
    let userPaused = false;

    async function safePlay() {
      try {
        await video.play();
      } catch (e) {
        console.log("再生できませんでした:", e);
      }
    }

    function updateMuteText() {
      muteBtn.textContent = video.muted ? "消音ON" : "音声ON";
    }

    target.addEventListener("targetFound", async () => {
      found = true;
      hint.textContent = "認識しました";
      if (!userPaused) {
        await safePlay();
      }
    });

    target.addEventListener("targetLost", () => {
      found = false;
      hint.textContent = "名刺をカメラに映してください";
      video.pause();
    });

    playBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      userPaused = false;
      await safePlay();
    });

    pauseBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      userPaused = true;
      video.pause();
    });

    muteBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      video.muted = !video.muted;
      updateMuteText();

      if (found && video.paused && !userPaused) {
        await safePlay();
      }
    });

    document.body.addEventListener("click", async (e) => {
      if (e.target.closest("#controls")) return;
      if (found && video.paused && !userPaused) {
        await safePlay();
      }
    });

    updateMuteText();
  </script>
</body>
</html>
